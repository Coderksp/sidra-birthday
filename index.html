<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Sidra! 🎉</title>
  <style>
    :root {
      --bg1: #1a0b2e;
      --bg2: #2d1b4e;
      --accent: #ff6ec7;
      --accent2: #ffd93d;
      --text: #fff5fb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      text-align: center;
      position: relative;
    }

    .card {
      position: relative;
      z-index: 2;
      padding: 3rem 2rem;
      max-width: 640px;
      animation: rise 1.2s ease-out both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: var(--accent2);
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    h1 {
      font-size: clamp(2.5rem, 9vw, 5rem);
      line-height: 1.05;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }

    .message {
      font-size: clamp(1rem, 3vw, 1.25rem);
      line-height: 1.7;
      color: #f3e8ff;
      opacity: 0.92;
      margin-bottom: 2.5rem;
    }

    .btn {
      background: linear-gradient(90deg, var(--accent), #c84bd6);
      color: white;
      border: none;
      padding: 0.9rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255, 110, 199, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(255, 110, 199, 0.55); }
    .btn:active { transform: translateY(0) scale(0.98); }

    .balloons { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .balloon {
      position: absolute;
      bottom: -140px;
      width: 46px; height: 58px;
      border-radius: 50%;
      opacity: 0.85;
      animation: float linear infinite;
    }
    .balloon::after {
      content: "";
      position: absolute;
      bottom: -40px; left: 50%;
      width: 1px; height: 40px;
      background: rgba(255,255,255,0.4);
    }
    @keyframes float {
      to { transform: translateY(-115vh) rotate(20deg); }
    }

    /* Confetti pieces are generated by JS */
    .confetti {
      position: fixed;
      width: 10px; height: 14px;
      top: -20px;
      z-index: 5;
      pointer-events: none;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(105vh) rotate(720deg); opacity: 0.9; }
    }

    .cake { font-size: 3.5rem; margin-bottom: 0.5rem; display: inline-block; animation: bob 2.5s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    footer { position: fixed; bottom: 1rem; width: 100%; font-size: 0.8rem; opacity: 0.5; z-index: 2; }
  </style>
</head>
<body>
  <div class="balloons" id="balloons"></div>

  <main class="card">
    <div class="cake">🎂</div>
    <p class="eyebrow">A little something for you</p>
    <h1>Happy Birthday,<br>Sidra!</h1>
    <p class="message">
      Wishing you a day as bright and wonderful as you are. 🌸
      May this year bring you endless joy, laughter, and every little thing
      that makes you smile. So glad to celebrate you today!
    </p>
    <button class="btn" id="celebrate">🎉 Make a wish</button>
  </main>

  <footer>Made with ❤️</footer>

  <script>
    // Floating balloons
    const colors = ["#ff6ec7", "#ffd93d", "#6ec7ff", "#b06eff", "#6effa3"];
    const balloonLayer = document.getElementById("balloons");
    for (let i = 0; i < 14; i++) {
      const b = document.createElement("div");
      b.className = "balloon";
      b.style.left = Math.random() * 100 + "vw";
      b.style.background = colors[i % colors.length];
      b.style.animationDuration = 6 + Math.random() * 8 + "s";
      b.style.animationDelay = Math.random() * 8 + "s";
      balloonLayer.appendChild(b);
    }

    // Confetti burst
    function burst() {
      for (let i = 0; i < 120; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = 2 + Math.random() * 2.5 + "s";
        c.style.animationDelay = Math.random() * 0.4 + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }
    }

    document.getElementById("celebrate").addEventListener("click", burst);
    // Auto-celebrate on load
    window.addEventListener("load", burst);
  </script>
</body>
</html>
